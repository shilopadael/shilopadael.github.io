<html>
    <head>
        <title>Hello4</title>

    </head>
    <body>
        <h1 style="color: blue;">Form</h1>
         <!--An input text field-->
        <div>
            <span>first name and last name:</span>
            <input type="text" name="name" placeholder="Israel Israely">
        </div>
        <!--An input date field-->
        <div>
            <span>Birth Date:</span>
            <input type="date" name="Birth" placeholder="14/11/1997" style="width:260px">
        </div>
        <!--Three radio buttons that work as a group-->
        <div>
            <label>Gender:</label><br>

            <input type="radio" name="Gender" value="option1">
            <label for="option1">Male</label><br>

            <input type="radio" name="Gender" value="option2">
            <label for="option2">Female</label> <br>

            <input type="radio" name="Gender" value="option3">
            <label for="option3">Other</label> <br>

        </div>
        <!--Three checkboxes-->        
        <div>
            <label>Like the most:</label><br>

            <input type="checkbox" name="Gender" value="option1">
            <label for="option1">Mom</label><br>

            <input type="checkbox" name="Gender" value="option2">
            <label for="option2">Dad</label> <br>

            <input type="checkbox" name="Gender" value="option3">
            <label for="option3">Burger</label> <br>

        </div>
        <!--A file upload input field-->
        <div>
            <label>Uplode your CV:</label><br>
            <input type="file" name="CV">
        </div>
        <!--A non-submit button-->
        <div>
            <button type="button">Clear</button>
        </div>
        <!--A non-submit button-->
        <div>
            <input type="submit" value="Submit">
                </div>
        
    </body>
</html>
